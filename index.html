<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena | Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="arena" id="arena">
      <section class="side side-player" id="sidePlayer">
        <span class="side-label">YOU</span>
        <span class="side-score" id="playerScore">0</span>
      </section>

      <div class="center-rail">
        <div class="match-status" id="matchStatus">FIRST TO 3</div>
        <div class="streak-flag" id="streakFlag" hidden></div>
      </div>

      <section class="side side-opponent" id="sideOpponent">
        <span class="side-label">RIVAL</span>
        <span class="side-score" id="opponentScore">0</span>
      </section>

      <div class="choice-dock" id="choiceDock">
        <button class="choice-btn" data-choice="rock" aria-label="Choose rock">
          <i data-lucide="hand-fist" class="choice-icon"></i>
        </button>
        <button
          class="choice-btn"
          data-choice="paper"
          aria-label="Choose paper"
        >
          <i data-lucide="hand" class="choice-icon"></i>
        </button>
        <button
          class="choice-btn"
          data-choice="scissors"
          aria-label="Choose scissors"
        >
          <i data-lucide="scissors" class="choice-icon"></i>
        </button>
      </div>

      <button class="log-toggle" id="logToggle" aria-label="Toggle match log">
        <i data-lucide="list" class="toggle-icon"></i>
      </button>

      <aside class="match-log" id="matchLog">
        <div class="log-header">
          <span>MATCH LOG</span>
          <button class="log-close" id="logClose" aria-label="Close log">
            <i data-lucide="x" class="toggle-icon"></i>
          </button>
        </div>
        <div class="log-entries" id="logEntries"></div>
      </aside>

      <div class="result-flood" id="resultFlood">
        <i data-lucide="zap" class="result-icon" id="resultIcon"></i>
        <span class="result-word" id="resultWord"></span>
        <span class="result-detail" id="resultDetail"></span>
        <button class="rematch-btn" id="rematchBtn" hidden>
          <i data-lucide="rotate-ccw" class="rematch-icon"></i>
          REMATCH
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
